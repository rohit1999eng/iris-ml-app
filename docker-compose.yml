version: "3.9"

services:
  # ── Development (hot-reload, mounts source) ──────────────────────────────
  ml-api-dev:
    build:
      context: .
      target: trainer        # only build training stage for dev
    image: iris-classifier:dev
    container_name: iris-dev
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app/app       # hot-reload source changes
      - ./model:/app/model   # persist trained model
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    command: python app/app.py
    profiles: ["dev"]

  # ── Production (multi-stage build, gunicorn) ─────────────────────────────
  ml-api:
    build:
      context: .
      target: production
    image: iris-classifier:latest
    container_name: iris-prod
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles: ["prod"]

  # ── Nginx reverse proxy (optional, for production) ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: iris-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ml-api
    profiles: ["prod-nginx"]
